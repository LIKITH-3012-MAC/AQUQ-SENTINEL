<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="assets/img/favicon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restore Key | AquaSentinel AI</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="bg-grid"></div>

    <div class="nav-container">
        <nav class="navbar" style="justify-content: center;">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-microchip text-gradient" style="font-size: 1.5rem;"></i>
                <span style="font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;">AQUA<span class="text-gradient">SENTINEL</span></span>
            </a>
        </nav>
    </div>

    <div class="glass-card hologram" style="width: 100%; max-width: 450px; padding: 4rem 3rem; text-align: center; border-color: var(--accent-color);">
        <div style="margin-bottom: 2rem;">
            <i class="fas fa-shield-halved text-gradient" style="font-size: 3rem; margin-bottom: 1.5rem;"></i>
            <h2 style="font-size: 2rem;">Restore <span class="text-gradient">Access</span></h2>
            <p id="step-desc" style="color: var(--text-secondary); font-size: 0.9rem;">Verify sector credentials to reset key</p>
        </div>

        <!-- Step 1: Email -->
        <div id="step-1">
            <div style="display: flex; flex-direction: column; gap: 1.5rem; text-align: left;">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Target Email</label>
                    <input type="email" id="reset-email" placeholder="official@aquasentinel.ai" required class="glass-card" style="padding: 1rem; background: rgba(255,255,255,0.03); color: white; border-radius: 12px; width: 100%;">
                </div>
                <button onclick="handleStep1()" class="btn btn-primary" style="width: 100%; justify-content: center;">Identify Account</button>
            </div>
        </div>

        <!-- Step 2: Security Question -->
        <div id="step-2" style="display: none;">
            <div style="display: flex; flex-direction: column; gap: 1.5rem; text-align: left;">
                <div style="padding: 1rem; background: rgba(0,243,255,0.05); border-radius: 12px; border: 1px solid rgba(0,243,255,0.1); margin-bottom: 0.5rem;">
                    <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-color); margin-bottom: 0.5rem;">Security Challenge</p>
                    <p id="display-question" style="font-weight: 600; color: white; line-height: 1.4;"></p>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Your Answer</label>
                    <input type="text" id="security-answer" placeholder="Enter recovery phrase" required class="glass-card" style="padding: 1rem; background: rgba(255,255,255,0.03); color: white; border-radius: 12px; width: 100%;">
                </div>
                <button onclick="handleStep2()" class="btn btn-primary" style="width: 100%; justify-content: center;">Verify Answer</button>
            </div>
        </div>

        <!-- Step 3: New Password -->
        <div id="step-3" style="display: none;">
            <div style="display: flex; flex-direction: column; gap: 1.5rem; text-align: left;">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">New Encryption Key</label>
                    <input type="password" id="new-password" placeholder="••••••••" required class="glass-card" style="padding: 1rem; background: rgba(255,255,255,0.03); color: white; border-radius: 12px; width: 100%;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Confirm Key</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required class="glass-card" style="padding: 1rem; background: rgba(255,255,255,0.03); color: white; border-radius: 12px; width: 100%;">
                </div>
                <button onclick="handleStep3()" class="btn btn-primary" style="width: 100%; justify-content: center;">Reset Key</button>
            </div>
        </div>

        <div id="reset-status" style="margin-top: 1.5rem; display: none; padding: 1rem; border-radius: 12px; font-size: 0.9rem;"></div>

        <div style="margin-top: 2.5rem; font-size: 0.9rem;">
            <a href="login.html" style="color: var(--text-secondary); text-decoration: none;">Return to Login</a>
        </div>
    </div>

    <!-- Core Intelligence Scripts -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/forgot-password.js"></script>
    <script src="assets/js/theme.js"></script>

    <script>
        let currentEmail = '';
        let resetToken = '';

        function showStatus(msg, type) {
            const statusBox = document.getElementById('reset-status');
            statusBox.textContent = msg;
            statusBox.style.display = 'block';
            if (type === 'error') {
                statusBox.style.background = 'rgba(255, 0, 85, 0.1)';
                statusBox.style.color = '#ff0055';
                statusBox.style.border = '1px solid rgba(255, 0, 85, 0.2)';
            } else {
                statusBox.style.background = 'rgba(0, 255, 136, 0.1)';
                statusBox.style.color = '#00ff88';
                statusBox.style.border = '1px solid rgba(0, 255, 136, 0.2)';
            }
        }

        async function handleStep1() {
            const email = document.getElementById('reset-email').value;
            if (!email) return showStatus('Please enter email', 'error');
            
            try {
                const question = await FORGOT_PASSWORD.requestQuestion(email);
                currentEmail = email;
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
                document.getElementById('display-question').textContent = question;
                document.getElementById('step-desc').textContent = 'Provide security answer';
                document.getElementById('reset-status').style.display = 'none';
            } catch (err) {
                showStatus(err.message, 'error');
            }
        }

        async function handleStep2() {
            const answer = document.getElementById('security-answer').value;
            if (!answer) return showStatus('Please enter answer', 'error');
            
            try {
                const token = await FORGOT_PASSWORD.verifyAnswer(currentEmail, answer);
                resetToken = token;
                document.getElementById('step-2').style.display = 'none';
                document.getElementById('step-3').style.display = 'block';
                document.getElementById('step-desc').textContent = 'Establish new encryption key';
                document.getElementById('reset-status').style.display = 'none';
            } catch (err) {
                showStatus(err.message, 'error');
            }
        }

        async function handleStep3() {
            const pass = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            
            if (!pass || pass !== confirm) return showStatus('Passwords do not match', 'error');
            if (pass.length < 8) return showStatus('Password must be 8+ characters', 'error');
            
            try {
                await FORGOT_PASSWORD.resetPassword(currentEmail, resetToken, pass);
                showStatus('Key Restored. Redirecting...', 'success');
            } catch (err) {
                showStatus(err.message, 'error');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AquaSentinel AI Command Center</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center;">
    <div class="glass-panel" style="width: 100%; max-width: 400px; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fas fa-microchip text-accent" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h2>System <span class="text-accent">Auth</span></h2>
            <p style="color: var(--text-secondary);">Initialize secure command session</p>
        </div>

        <form id="login-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Access Identity (Email)</label>
                <input type="email" id="email" required class="glass-panel" style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: white; padding: 0.8rem;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Encryption Key (Password)</label>
                <input type="password" id="password" required class="glass-panel" style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: white; padding: 0.8rem;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Verify Credentials</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
            <span style="color: var(--text-secondary);">New Intelligence Officer?</span>
            <a href="register.html" class="text-accent">Register Sector</a>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Authenticating...';
            btn.disabled = true;

            try {
                const res = await API.auth.login({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });

                if (res.access_token) {
                    localStorage.setItem('token', res.access_token);
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Authentication failed: ' + (res.detail || 'Invalid credentials'));
                }
            } catch (err) {
                alert('Connection Error');
            } finally {
                btn.textContent = 'Verify Credentials';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

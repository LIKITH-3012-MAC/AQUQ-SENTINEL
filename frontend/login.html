<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AquaSentinel AI</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/glass-ui.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
  <div class="container auth-container">
    <div class="glass-panel auth-panel">
      <div class="auth-header">
        <div class="navbar-brand">
          <i class="fas fa-microchip text-accent"></i>
          <span>AquaSentinel <span class="text-accent">AI</span></span>
        </div>
        <h2>Welcome Back</h2>
        <p class="text-muted">Enter your credentials to access the intelligence dashboard.</p>
      </div>
      
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="glass-input" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="glass-input" placeholder="••••••••" required>
        </div>
        <div id="errorMessage" class="error-text"></div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>
      
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
      </div>
    </div>
  </div>

  <style>
    .auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .auth-container { max-width: 450px; width: 100%; }
    .auth-panel { padding: 3rem; text-align: center; }
    .auth-header { margin-bottom: 2rem; }
    .auth-header h2 { margin-top: 1.5rem; margin-bottom: 0.5rem; }
    .auth-form { text-align: left; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted); }
    .btn-block { width: 100%; margin-top: 1rem; }
    .auth-footer { margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem; font-size: 0.9rem; }
    .error-text { color: var(--risk-critical); font-size: 0.85rem; margin-bottom: 1rem; display: none; }
  </style>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');
      
      errorDiv.style.display = 'none';
      
      const result = await AUTH.login(email, password);
      if (result.success) {
        if (result.user.role === 'admin') {
          window.location.href = 'admin/control-tower.html';
        } else {
          window.location.href = 'user-dashboard.html';
        }
      } else {
        errorDiv.textContent = 'Invalid email or password. Please try again.';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>

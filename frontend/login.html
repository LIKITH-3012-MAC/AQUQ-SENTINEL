<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="assets/img/favicon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | AquaSentinel AI</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="bg-grid"></div>

    <div class="nav-container">


        <nav class="navbar" style="justify-content: center;">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-microchip text-gradient" style="font-size: 1.5rem;"></i>
                <span style="font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;">AQUA<span class="text-gradient">SENTINEL</span></span>
            </a>
        </nav>
    </div>

    <div class="glass-card hologram" style="width: 100%; max-width: 450px; padding: 4rem 3rem; text-align: center; border-color: var(--accent-color);">
        <div style="margin-bottom: 3rem;">
            <i class="fas fa-key text-gradient" style="font-size: 3rem; margin-bottom: 1.5rem;"></i>
            <h2 style="font-size: 2rem;">Officer <span class="text-gradient">Auth</span></h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Initialize secure command session</p>
        </div>

        <form id="login-form" style="display: flex; flex-direction: column; gap: 1.5rem; text-align: left;">
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Access Identity</label>
                <input type="email" id="email" placeholder="official@aquasentinel.ai" required class="glass-card" style="padding: 1rem; background: rgba(255,255,255,0.03); color: white; border-radius: 12px; width: 100%;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Encryption Key</label>
                <input type="password" id="password" placeholder="••••••••" required class="glass-card" style="padding: 1rem; background: rgba(255,255,255,0.03); color: white; border-radius: 12px; width: 100%;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Authenticate</button>
        </form>

        <div style="margin-top: 2.5rem; font-size: 0.9rem; display: flex; flex-direction: column; gap: 0.8rem;">
            <div>
                <span style="color: var(--text-secondary);">New Officer?</span>
                <a href="register.html" class="text-gradient" style="font-weight: 700; text-decoration: none; margin-left: 0.5rem;">Register Sector</a>
            </div>
            <div>
                <a href="forgot-password.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; transition: var(--transition);" onmouseover="this.style.color='white'" onmouseout="this.style.color='var(--text-secondary)'">Forgotten Intelligence Key?</a>
            </div>
        </div>
    </div>

    <!-- Core Intelligence Scripts -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/theme.js"></script>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Verifying Identity...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await AUTH.login(email, password);
                // Redirect is handled in AUTH.login
            } catch (err) {
                alert('Authentication Failure: ' + err.message);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

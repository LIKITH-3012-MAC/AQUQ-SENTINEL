<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AquaSentinel AI Command Center</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center;">
    <div class="glass-panel" style="width: 100%; max-width: 450px; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fas fa-user-plus text-accent" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h2>Initialize <span class="text-accent">Protocol</span></h2>
            <p style="color: var(--text-secondary);">Register your intelligence sector</p>
        </div>

        <form id="register-form" style="display: flex; flex-direction: column; gap: 1.2rem;">
            <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;">Officer Name</label>
                <input type="text" id="name" required class="glass-panel" style="background: rgba(255,255,255,0.05); color: white; padding: 0.8rem;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;">Official Email</label>
                <input type="email" id="email" required class="glass-panel" style="background: rgba(255,255,255,0.05); color: white; padding: 0.8rem;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;">Encryption Key</label>
                <input type="password" id="password" required class="glass-panel" style="background: rgba(255,255,255,0.05); color: white; padding: 0.8rem;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Deploy Identity</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
            <span style="color: var(--text-secondary);">Already enlisted?</span>
            <a href="login.html" class="text-accent">Return to Command</a>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Deploying...';
            btn.disabled = true;

            try {
                const res = await API.auth.register({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });

                if (res.id) {
                    alert('Identity Deployed Successfully. Redirecting to Login.');
                    window.location.href = 'login.html';
                } else {
                    alert('Deployment Failed: ' + (res.detail || 'Unknown Error'));
                }
            } catch (err) {
                alert('Connection Error');
            } finally {
                btn.textContent = 'Deploy Identity';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

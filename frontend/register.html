<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Registration | AquaSentinel AI</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="bg-grid"></div>

    <div class="nav-container">
        <nav class="navbar" style="justify-content: center;">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-microchip text-gradient" style="font-size: 1.5rem;"></i>
                <span style="font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;">AQUA<span class="text-gradient">SENTINEL</span></span>
            </a>
        </nav>
    </div>

    <div class="glass-card hologram" style="width: 100%; max-width: 500px; padding: 4rem 3rem; text-align: center; border-color: var(--accent-color);">
        <div style="margin-bottom: 2.5rem;">
            <i class="fas fa-user-plus text-gradient" style="font-size: 3rem; margin-bottom: 1.5rem;"></i>
            <h2 style="font-size: 2rem;">Officer <span class="text-gradient">Registration</span></h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Enlist in the Global Marine Protection Mission</p>
        </div>

        <form id="register-form" style="display: flex; flex-direction: column; gap: 1.2rem; text-align: left;">
            <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Full Name</label>
                <input type="text" id="name" placeholder="Officer Name" required class="glass-card" style="padding: 0.8rem; background: rgba(255,255,255,0.03); color: white; border-radius: 12px; width: 100%;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Official Email</label>
                <input type="email" id="email" placeholder="officer@aquasentinel.ai" required class="glass-card" style="padding: 0.8rem; background: rgba(255,255,255,0.03); color: white; border-radius: 12px; width: 100%;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Command Key (Password)</label>
                <input type="password" id="password" placeholder="••••••••" required class="glass-card" style="padding: 0.8rem; background: rgba(255,255,255,0.03); color: white; border-radius: 12px; width: 100%;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Security Question</label>
                <select id="security_question" required class="glass-card" style="padding: 0.8rem; background: rgba(0,0,0,0.5); color: white; border-radius: 12px; width: 100%; border: 1px solid var(--border-color);">
                    <option value="" disabled selected>Select a recovery question</option>
                    <option value="What was the name of your first ocean mission?">What was the name of your first ocean mission?</option>
                    <option value="What is your favorite marine species?">What is your favorite marine species?</option>
                    <option value="In which coastal city were you born?">In which coastal city were you born?</option>
                    <option value="What was the model of your first diving watch?">What was the model of your first diving watch?</option>
                </select>
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Security Answer</label>
                <input type="text" id="security_answer" placeholder="Secure recovery phrase" required class="glass-card" style="padding: 0.8rem; background: rgba(255,255,255,0.03); color: white; border-radius: 12px; width: 100%;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Deploy Identity</button>
        </form>

        <div id="status-message" style="margin-top: 1.5rem; display: none; padding: 1rem; border-radius: 12px;"></div>

        <div style="margin-top: 2rem; font-size: 0.9rem;">
            <span style="color: var(--text-secondary);">Already enlisted?</span>
            <a href="login.html" class="text-gradient" style="font-weight: 700; text-decoration: none; margin-left: 0.5rem;">Return to Base</a>
        </div>
    </div>

    <!-- Core Intelligence Scripts -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/theme.js"></script>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const statusBox = document.getElementById('status-message');
            const originalText = btn.textContent;
            
            btn.textContent = 'Establishing Identity...';
            btn.disabled = true;

            const userData = {
                full_name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                security_question: document.getElementById('security_question').value,
                security_answer: document.getElementById('security_answer').value
            };

            try {
                const res = await AUTH.register(userData);
                statusBox.textContent = res.message;
                statusBox.style.display = 'block';
                statusBox.style.background = 'rgba(0, 255, 136, 0.1)';
                statusBox.style.color = '#00ff88';
                statusBox.style.border = '1px solid rgba(0, 255, 136, 0.2)';
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                statusBox.textContent = 'Intelligence Registration Failed: ' + err.message;
                statusBox.style.display = 'block';
                statusBox.style.background = 'rgba(255, 0, 85, 0.1)';
                statusBox.style.color = '#ff0055';
                statusBox.style.border = '1px solid rgba(255, 0, 85, 0.2)';
                
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

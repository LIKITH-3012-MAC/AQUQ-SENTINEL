<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Command Map | AquaSentinel AI</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        #map {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
        }
        .map-ui {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }
        .map-ui * { pointer-events: all; }
        
        .panel-left {
            position: absolute;
            top: 6rem;
            left: 2rem;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel-bottom {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            max-width: 90%;
        }

        .layer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        /* Leaflet Customization */
        .leaflet-container { background: #020617 !important; }
        .leaflet-control-zoom { border: none !important; box-shadow: var(--glow) !important; }
        .leaflet-bar a { background: var(--surface-color) !important; color: var(--text-primary) !important; border: 1px solid var(--border-color) !important; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="nav-container">
        <nav class="navbar">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-microchip text-gradient" style="font-size: 1.5rem;"></i>
                <span style="font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;">AQUA<span class="text-gradient">SENTINEL</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="map.html" class="active">Map</a></li>
                <li><a href="dashboard.html">Reports</a></li>
                <li><a href="admin.html">AI Detect</a></li>
            </ul>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="theme-toggle" onclick="UI.toggleTheme()">
                    <i class="fas fa-sun"></i>
                </div>
                <a href="dashboard.html" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Base Base</a>
            </div>
        </nav>
    </div>

    <div class="map-ui">
        <div class="panel-left">
            <div class="glass-card hologram" style="padding: 1.5rem;">
                <h3 style="font-size: 1rem; margin-bottom: 1rem;"><i class="fas fa-layer-group text-gradient"></i> Intelligence Layers</h3>
                <div class="layer-item">
                    <span>NASA Chlorophyll</span>
                    <input type="checkbox" checked>
                </div>
                <div class="layer-item">
                    <span>Debris Heatmap</span>
                    <input type="checkbox">
                </div>
                <div class="layer-item">
                    <span>Risk Zones</span>
                    <input type="checkbox" checked>
                </div>
                <div class="layer-item">
                    <span>Sea Surface Temp</span>
                    <input type="checkbox">
                </div>
            </div>

            <div class="glass-card" id="location-panel" style="display: none;">
                <h4 id="loc-name">Sector Data</h4>
                <div id="loc-data" style="font-size: 0.85rem; margin-top: 1rem; color: var(--text-secondary);">
                    <!-- Dynamic Data -->
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 1rem; font-size: 0.8rem; padding: 0.6rem;">Initialize Digital Twin</button>
            </div>
        </div>

        <div class="panel-bottom">
            <div class="glass-card" style="padding: 0.8rem 2rem; border-radius: 50px; display: flex; gap: 2rem; align-items: center;">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-location-crosshairs text-gradient"></i>
                    <span style="font-size: 0.8rem; font-weight: 700;">COMMAND MAP ACTIVE</span>
                </div>
                <div style="width: 1px; height: 20px; background: var(--border-color);"></div>
                <div style="font-size: 0.8rem; color: var(--text-secondary);">LAT: <span id="cur-lat">0.00</span></div>
                <div style="font-size: 0.8rem; color: var(--text-secondary);">LON: <span id="cur-lon">0.00</span></div>
            </div>
        </div>
    </div>

    <div class="ai-trigger" id="ai-copilot-trigger">
        <i class="fas fa-robot" style="font-size: 1.5rem; color: #000;"></i>
    </div>

    <div class="copilot-widget glass-card" id="copilot-widget" style="position: fixed; bottom: 6rem; right: 2rem; width: 400px; height: 500px; z-index: 2000; display: none; flex-direction: column; padding: 0;">
        <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 0.5rem; font-weight: 700;">
                <i class="fas fa-robot text-gradient"></i> MAP INTELLIGENCE
            </div>
            <i class="fas fa-times" style="cursor: pointer;" onclick="UI.toggleAICopilot()"></i>
        </div>
        <div id="chat-box" style="flex: 1; overflow-y: auto; padding: 1.5rem;">
            <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 15px; font-size: 0.9rem;">
                Map analysis online. Select a coordinate to begin environmental risk assessment.
            </div>
        </div>
        <div style="padding: 1rem; border-top: 1px solid var(--border-color); display: flex; gap: 0.5rem;">
            <input type="text" id="chat-input" placeholder="Analyze current area..." style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 50px; padding: 0.6rem 1.2rem; color: white;">
            <button class="btn btn-primary" style="padding: 0.6rem 1.2rem; border-radius: 50%;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <style>
        .copilot-widget.active { display: flex !important; }
    </style>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/theme.js"></script>
    <script>
        const map = L.map('map', { zoomControl: true, attributionControl: false }).setView([20, 0], 3);
        
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');

        function updateMapTiles() {
            const theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'light') {
                map.removeLayer(darkTiles);
                lightTiles.addTo(map);
            } else {
                map.removeLayer(lightTiles);
                darkTiles.addTo(map);
            }
        }

        updateMapTiles();
        
        // Listen for theme changes
        const observer = new MutationObserver(updateMapTiles);
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        map.on('mousemove', e => {
            document.getElementById('cur-lat').textContent = e.latlng.lat.toFixed(4);
            document.getElementById('cur-lon').textContent = e.latlng.lng.toFixed(4);
        });

        async function initMapData() {
            try {
                const summary = await API.dashboard.summary();
                summary.risk_heatmap.forEach(r => {
                    const color = r.level === 'CRITICAL' ? '#ef4444' : r.level === 'HIGH' ? '#f59e0b' : '#10b981';
                    L.circleMarker([r.latitude, r.longitude], {
                        radius: 8,
                        fillColor: color,
                        color: color,
                        weight: 1,
                        opacity: 0.8,
                        fillOpacity: 0.4
                    }).addTo(map).on('click', () => {
                        const panel = document.getElementById('location-panel');
                        panel.style.display = 'block';
                        document.getElementById('loc-name').textContent = `Sector: ${r.latitude.toFixed(2)}, ${r.longitude.toFixed(2)}`;
                        document.getElementById('loc-data').innerHTML = `
                            <div style="display:flex; justify-content:space-between;"><span>Risk Score:</span> <span style="color:${color}">${r.score}</span></div>
                            <div style="display:flex; justify-content:space-between;"><span>Alerts:</span> <span>${r.level}</span></div>
                            <p style="margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border-color);">${r.explanation}</p>
                        `;
                    });
                });
            } catch (err) { console.error(err); }
        }
        initMapData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="assets/img/favicon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Command Map | AquaSentinel AI</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/alerts.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        #map {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
        }
        .map-ui {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }
        .map-ui * { pointer-events: all; }
        
        .panel-left {
            position: absolute;
            top: 6rem;
            left: 2rem;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel-bottom {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            max-width: 90%;
        }

        .layer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        /* Leaflet Customization */
        .leaflet-container { background: #020617 !important; }
        .leaflet-control-zoom { border: none !important; box-shadow: var(--glow) !important; }
        .leaflet-bar a { background: var(--surface-color) !important; color: var(--text-primary) !important; border: 1px solid var(--border-color) !important; }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.5); opacity: 0.3; }
            100% { transform: scale(2); opacity: 0; }
        }
        .pulse-animation {
            animation: pulse 2s infinite ease-out;
            transform-origin: center;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="nav-container">
        <nav class="navbar">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-microchip text-gradient" style="font-size: 1.5rem;"></i>
                <span style="font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;">AQUA<span class="text-gradient">SENTINEL</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="map.html" class="active">Map</a></li>
                <li><a href="location-risk.html">Risk Engine</a></li>
                <li><a href="report.html">Report Issue</a></li>
            </ul>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="theme-toggle" onclick="UI.toggleTheme()">
                    <i class="fas fa-sun"></i>
                </div>
                <a href="profile.html" class="btn btn-outline" style="padding: 0.5rem 1.2rem; font-size: 0.8rem;"><i class="fas fa-user-circle"></i> Profile</a>
                <a href="dashboard.html" class="btn btn-primary" style="padding: 0.5rem 1.5rem; font-size: 0.8rem;">Command Base</a>
                <button onclick="AUTH.logout()" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.8rem; border-color: var(--danger); color: var(--danger);">Abort Session</button>
            </div>
        </nav>
    </div>

    <div class="map-ui">
        <div class="panel-left">
            <div class="glass-card hologram" style="padding: 1.5rem;">
                <h3 style="font-size: 1rem; margin-bottom: 1rem;"><i class="fas fa-layer-group text-gradient"></i> Intelligence Layers</h3>
                <div class="layer-item">
                    <span>NASA Chlorophyll</span>
                    <input type="checkbox" id="layer-chlorophyll" onchange="MAP.toggleChlorophyll(this.checked)">
                </div>
                <div class="layer-item">
                    <span>Debris Heatmap</span>
                    <input type="checkbox" id="layer-heatmap" onchange="MAP.toggleHeatmap(this.checked)">
                </div>
                <div class="layer-item">
                    <span>Risk Zones</span>
                    <input type="checkbox" id="layer-risk" onchange="MAP.toggleRiskZones(this.checked)">
                </div>
                <div class="layer-item">
                    <span>Predictive Drift</span>
                    <input type="checkbox" id="layer-drift" onchange="MAP.toggleDriftLayer(this.checked)">
                </div>
                <div class="layer-item">
                    <span>Sea Surface Temp</span>
                    <input type="checkbox" id="layer-sst" onchange="MAP.toggleSST(this.checked)">
                </div>
            </div>

            <div class="glass-card" id="location-panel" style="display: none;">
                <h4 id="loc-name">Sector Data</h4>
                <div id="loc-data" style="font-size: 0.85rem; margin-top: 1rem; color: var(--text-secondary);">
                    <!-- Dynamic Data -->
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 1rem; font-size: 0.8rem; padding: 0.6rem;">Initialize Digital Twin</button>
            </div>
        </div>

        <div class="panel-bottom">
            <div class="glass-card" style="padding: 0.8rem 2rem; border-radius: 50px; display: flex; gap: 2rem; align-items: center;">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-location-crosshairs text-gradient"></i>
                    <span style="font-size: 0.8rem; font-weight: 700;">COMMAND MAP ACTIVE</span>
                </div>
                <div style="width: 1px; height: 20px; background: var(--border-color);"></div>
                <div style="font-size: 0.8rem; color: var(--text-secondary);">LAT: <span id="cur-lat">0.00</span></div>
                <div style="font-size: 0.8rem; color: var(--text-secondary);">LON: <span id="cur-lon">0.00</span></div>
            </div>
        </div>
    </div>

    <!-- AI Copilot Interface -->
    <div class="ai-trigger" id="ai-copilot-trigger">
        <i class="fas fa-robot" style="font-size: 1.5rem; color: #000;"></i>
    </div>

    <div class="copilot-widget glass-card" id="copilot-widget" style="position: fixed; bottom: 6rem; right: 2rem; width: 420px; height: 550px; z-index: 2000; display: none; flex-direction: column; padding: 0;">
        <div style="padding: 1.2rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02);">
            <div style="display: flex; align-items: center; gap: 0.6rem; font-weight: 800; font-size: 0.9rem;">
                <i class="fas fa-robot text-gradient"></i> AI COPILOT
            </div>
            <div style="display: flex; gap: 0.8rem; align-items: center;">
                <select id="chat-lang-select" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 5px; outline: none;">
                    <option value="English">English</option>
                    <option value="Telugu">Telugu</option>
                    <option value="Tamil">Tamil</option>
                    <option value="Hindi">Hindi</option>
                </select>
                <i class="fas fa-times" style="cursor: pointer; font-size: 0.9rem; color: var(--text-secondary);" onclick="UI.toggleAICopilot()"></i>
            </div>
        </div>
        <div id="chat-box" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; scroll-behavior: smooth;">
            <!-- Messages rendered by JS -->
        </div>
        <div style="padding: 1rem; border-top: 1px solid var(--border-color); display: flex; gap: 0.8rem; background: rgba(0,0,0,0.1);">
            <input type="text" id="chat-input" placeholder="Analyze current area..." style="flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 50px; padding: 0.7rem 1.2rem; color: white; font-size: 0.85rem; outline: none;">
            <button class="btn btn-primary" style="padding: 0; width: 40px; height: 40px; border-radius: 50%;"><i class="fas fa-paper-plane" style="font-size: 0.8rem;"></i></button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <!-- Core Intelligence Scripts -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/alerts.js"></script>

    <script>
        AUTH.requireAuth();

        const map = L.map('map', { zoomControl: true, attributionControl: false }).setView([20, 0], 3);
        
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');

        function updateMapTiles() {
            const theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'light') {
                map.removeLayer(darkTiles);
                lightTiles.addTo(map);
            } else {
                map.removeLayer(lightTiles);
                darkTiles.addTo(map);
            }
        }

        updateMapTiles();
        
        const observer = new MutationObserver(updateMapTiles);
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        map.on('mousemove', e => {
            document.getElementById('cur-lat').textContent = e.latlng.lat.toFixed(4);
            document.getElementById('cur-lon').textContent = e.latlng.lng.toFixed(4);
        });

        // Layer Persistence Containers
        const layers = {
            chlorophyll: L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Aqua_Chlorophyll_A/default/{time}/GoogleMapsCompatible_Level9/{z}/{y}/{x}.png', {
                time: new Date().toISOString().split('T')[0],
                attribution: 'NASA GIBS',
                opacity: 0.6
            }),
            sst: L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_Sea_Surface_Temp_Day/default/{time}/GoogleMapsCompatible_Level7/{z}/{y}/{x}.png', {
                time: new Date().toISOString().split('T')[0],
                attribution: 'NASA GIBS',
                opacity: 0.6
            }),
            riskZones: L.layerGroup(),
            heatmap: null, // Initialized on demand
            drift: L.layerGroup(),
            simulated: L.layerGroup().addTo(map)
        };

        window.MAP = {
            toggleChlorophyll: (enabled) => enabled ? layers.chlorophyll.addTo(map) : map.removeLayer(layers.chlorophyll),
            
            toggleSST: (enabled) => enabled ? layers.sst.addTo(map) : map.removeLayer(layers.sst),
            
            toggleRiskZones: async (enabled) => {
                if (enabled) {
                    try {
                        const summary = await API.dashboard.summary();
                        layers.riskZones.clearLayers();
                        summary.risk_heatmap.forEach(r => {
                            const color = r.level === 'CRITICAL' ? '#ef4444' : r.level === 'HIGH' ? '#f59e0b' : '#10b981';
                            const marker = L.circleMarker([r.latitude, r.longitude], {
                                radius: 8, fillColor: color, color: color, weight: 1, opacity: 0.8, fillOpacity: 0.4
                            }).on('click', () => {
                                const panel = document.getElementById('location-panel');
                                panel.style.display = 'block';
                                document.getElementById('loc-name').textContent = `Sector: ${r.latitude.toFixed(2)}, ${r.longitude.toFixed(2)}`;
                                document.getElementById('loc-data').innerHTML = `
                                    <div style="display:flex; justify-content:space-between;"><span>Risk Score:</span> <span style="color:${color}">${r.score}</span></div>
                                    <div style="display:flex; justify-content:space-between;"><span>Alerts:</span> <span>${r.level}</span></div>
                                    <p style="margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border-color);">${r.explanation}</p>
                                `;
                            });
                            layers.riskZones.addLayer(marker);
                        });
                        layers.riskZones.addTo(map);
                    } catch (err) { console.error("Risk Layer Failure:", err); }
                } else {
                    map.removeLayer(layers.riskZones);
                }
            },

            toggleHeatmap: async (enabled) => {
                if (enabled) {
                    try {
                        const heatmapPoints = await API.request('/reports/heatmap');
                        if (layers.heatmap) map.removeLayer(layers.heatmap);
                        
                        layers.heatmap = L.heatLayer(heatmapPoints, {
                            radius: 25,
                            blur: 15,
                            maxZoom: 10,
                            gradient: {0.4: 'blue', 0.65: 'lime', 1: 'red'}
                        }).addTo(map);
                        
                        if (heatmapPoints.length === 0) {
                            UI.showToast("No debris telemetry available for this region.", "info");
                        }
                    } catch (err) { console.error("Heatmap Layer Failure:", err); }
                } else if (layers.heatmap) {
                    map.removeLayer(layers.heatmap);
                }
            },

            toggleDriftLayer: async (enabled) => {
                if (enabled) {
                    try {
                        const predictions = await API.request('/predictions/hotspots');
                        layers.drift.clearLayers();
                        
                        if (!predictions || predictions.length === 0) {
                            UI.showToast("No active drift predictions found.", "info");
                            return;
                        }

                        predictions.forEach(p => {
                            if (p.drift_path) {
                                const latlngs = p.drift_path.map(pt => [pt.lat, pt.lon]);
                                const poly = L.polyline(latlngs, {
                                    color: '#f59e0b', weight: 3, dashArray: '10, 10', opacity: 0.6
                                });
                                
                                const target = L.circle(latlngs[latlngs.length - 1], {
                                    radius: 2000, color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.2
                                }).bindPopup(`
                                    <div style="font-family: 'Outfit'; color: white;">
                                        <h4 style="color: #ef4444; font-size: 0.8rem; margin-bottom: 0.5rem;">FUTURE HOTSPOT</h4>
                                        <p style="font-size: 0.75rem; line-height: 1.4;">${p.action_recommendation}</p>
                                    </div>
                                `);
                                
                                layers.drift.addLayer(poly);
                                layers.drift.addLayer(target);
                            }
                        });
                        layers.drift.addTo(map);
                    } catch (err) { console.error("Drift Layer Failure:", err); }
                } else {
                    map.removeLayer(layers.drift);
                }
            }
        };

        async function loadSimulatedEvents() {
            try {
                const events = await API.request('/alerts/map-events');
                layers.simulated.clearLayers();
                events.forEach(ev => {
                    const icon = L.divIcon({
                        className: 'sim-event-icon',
                        html: `<div class="pulse-animation" style="background: ${ev.severity === 'Critical' ? '#ef4444' : '#00f3ff'}; width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5);"></div>`,
                        iconSize: [15, 15]
                    });
                    
                    const marker = L.marker([ev.latitude, ev.longitude], { icon }).bindPopup(`
                        <div style="font-family: 'Outfit'; min-width: 150px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                                <span class="status-tag critical" style="font-size: 0.6rem;">SIMULATED</span>
                                <span style="font-size: 0.7rem; color: var(--text-secondary);">${new Date(ev.created_at).toLocaleTimeString()}</span>
                            </div>
                            <div style="font-weight: 800; font-size: 0.9rem; color: var(--accent-color); margin-bottom: 0.3rem;">RISK DETECTED</div>
                            <div style="font-size: 0.8rem; color: var(--text-secondary);">Type: ${ev.marker_type.toUpperCase()}</div>
                            <div style="font-size: 0.8rem; color: var(--text-secondary);">Severity: ${ev.severity}</div>
                            <div style="font-size: 0.8rem; color: var(--text-secondary);">Radius: ${ev.radius_km}km</div>
                        </div>
                    `);
                    layers.simulated.addLayer(marker);
                });
            } catch (err) { console.error("Failed to load simulated events:", err); }
        }

        // Real-time Alert Polling is now handled by GlobalAlerts (alerts.js)

        // Initialize default active layers
        setTimeout(() => {
            if (document.getElementById('layer-risk').checked) MAP.toggleRiskZones(true);
            if (document.getElementById('layer-chlorophyll').checked) MAP.toggleChlorophyll(true);
            
            loadSimulatedEvents();
            setInterval(() => {
                loadSimulatedEvents();
            }, 10000);
        }, 500);

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Marine Map | AquaSentinel AI</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    .map-overlay {
      position: absolute;
      top: 2rem;
      left: 2rem;
      z-index: 1000;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .layer-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Custom Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .4s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: var(--accent-neon);
    }

    input:checked+.slider:before {
      transform: translateX(20px);
    }
  </style>
</head>

<body>
  <div style="position: relative; height: 100vh; width: 100vw;">
    <div id="map" style="height: 100%; width: 100%;"></div>

    <!-- Sidebar Overlay -->
    <div class="map-overlay">
      <div class="glass-panel">
        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
          <i class="fas fa-satellite text-accent"></i>
          <h3 style="margin: 0; font-size: 1rem;">Layer Control</h3>
        </div>

        <div class="layer-toggle">
          <span>NASA Chlorophyll-a</span>
          <label class="switch"><input type="checkbox" id="toggle-chl" checked><span class="slider"></span></label>
        </div>
        <div class="layer-toggle">
          <span>Sea Surface Temp</span>
          <label class="switch"><input type="checkbox" id="toggle-sst"><span class="slider"></span></label>
        </div>
        <div class="layer-toggle">
          <span>Debris Heatmap</span>
          <label class="switch"><input type="checkbox" id="toggle-debris"><span class="slider"></span></label>
        </div>
        <div class="layer-toggle">
          <span>Risk Zones</span>
          <label class="switch"><input type="checkbox" id="toggle-risk"><span class="slider"></span></label>
        </div>
      </div>

      <div class="glass-panel hologram-panel" id="simulation-panel">
        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
          <i class="fas fa-project-diagram text-accent"></i>
          <h3 style="margin: 0; font-size: 1rem;">Digital Twin Sim</h3>
        </div>
        <div style="display: flex; flex-direction: column; gap: 0.8rem;">
          <select id="sim-type" class="glass-panel"
            style="background: rgba(255,255,255,0.05); color: white; padding: 0.4rem;">
            <option value="oil_spill">Oil Spill Spread</option>
            <option value="plastic_flow">Plastic Flow</option>
          </select>
          <input type="number" id="sim-volume" placeholder="Volume (m³)" class="glass-panel"
            style="background: rgba(255,255,255,0.05); color: white; padding: 0.4rem;">
          <button onclick="runSimulation()" class="btn btn-primary"
            style="font-size: 0.7rem; padding: 0.5rem;">Initialize Simulation</button>
        </div>
        <div id="sim-results"
          style="margin-top: 1rem; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 0.5rem; display: none;">
          <!-- Sim results here -->
        </div>
      </div>

      <div class="glass-panel" id="location-details" style="display: none;">
        <h4 id="loc-name">Select Location</h4>
        <div id="loc-stats" style="font-size: 0.8rem; display: flex; flex-direction: column; gap: 0.5rem;">
          <!-- Location data will be injected here -->
        </div>
      </div>

      <a href="dashboard.html" class="btn btn-primary" style="width: 100%; justify-content: center;">
        <i class="fas fa-arrow-left"></i> Exit Command Map
      </a>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    const map = L.map('map', {
      zoomControl: false,
      attributionControl: false
    }).setView([20, 0], 3);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19
    }).addTo(map);

    // Simulated Layers
    const layers = {
      chl: L.layerGroup(),
      sst: L.layerGroup(),
      debris: L.layerGroup(),
      risk: L.layerGroup()
    };

    // Initialize Map Markers & Interactions
    async function initMap() {
      try {
        const summary = await API.dashboard.summary();

        summary.risk_heatmap.forEach(r => {
          const color = r.level === 'CRITICAL' ? '#ff0055' : r.level === 'HIGH' ? '#ff9d00' : '#00ff9d';
          const marker = L.circleMarker([r.latitude, r.longitude], {
            radius: 10,
            fillColor: color,
            color: color,
            weight: 1,
            opacity: 0.8,
            fillOpacity: 0.4
          }).addTo(map);

          marker.on('click', () => showLocationDetails(r));
        });
      } catch (err) {
        console.error(err);
      }
    }

    function showLocationDetails(data) {
      const panel = document.getElementById('location-details');
      panel.style.display = 'block';
      document.getElementById('loc-name').textContent = `Sector: ${data.latitude.toFixed(2)}, ${data.longitude.toFixed(2)}`;
      document.getElementById('loc-stats').innerHTML = `
                <div style="display: flex; justify-content: space-between;"><span>Risk Score:</span> <span class="text-accent">${data.score}</span></div>
                <div style="display: flex; justify-content: space-between;"><span>Level:</span> <span style="color: var(--risk-${data.level.toLowerCase()})">${data.level}</span></div>
                <p style="margin-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 0.5rem;">${data.explanation}</p>
            `;

      // Set for simulation
      window.lastSelectedLat = data.latitude;
      window.lastSelectedLon = data.longitude;
    }

    async function runSimulation() {
      const type = document.getElementById('sim-type').value;
      const vol = document.getElementById('sim-volume').value;
      if (!vol || !window.lastSelectedLat) {
        alert("Please select a location on the map first and enter volume.");
        return;
      }

      const resultsDiv = document.getElementById('sim-results');
      resultsDiv.style.display = 'block';
      resultsDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Running Quantum Ocean Models...';

      try {
        const res = await API.simulation.pollution(window.lastSelectedLat, window.lastSelectedLon, type, vol);

        resultsDiv.innerHTML = `
                    <div style="color: var(--accent-neon); margin-bottom: 0.5rem;">SIMULATION COMPLETE</div>
                    <div>Spread Radius: ${res.simulation.results.spread_radius_km.toFixed(2)} km</div>
                    <div style="margin-top: 0.5rem; color: var(--risk-high);">PRESCRIPTION:</div>
                    <ul style="padding-left: 1rem; margin-top: 0.2rem;">
                        ${res.prescription.actions.map(a => `<li>${a}</li>`).join('')}
                    </ul>
                `;

        // Draw path on map
        const pathCoords = res.simulation.results.predicted_path.map(p => [p.lat, p.lon]);
        L.polyline(pathCoords, { color: 'cyan', dashArray: '5, 10' }).addTo(map);
      } catch (err) {
        resultsDiv.innerHTML = 'Simulation engine offline.';
      }
    }

    function toggleCopilot() {
      document.getElementById('copilot').classList.toggle('active');
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const box = document.getElementById('chat-box');
      const text = input.value.trim();
      if (!text) return;

      box.innerHTML += `<div class="chat-bubble bubble-user">${text}</div>`;
      input.value = '';
      box.scrollTop = box.scrollHeight;

      const botId = 'bot-' + Date.now();
      box.innerHTML += `<div class="chat-bubble bubble-bot" id="${botId}"><i class="fas fa-spinner fa-spin"></i> Processing Ocean Intelligence...</div>`;
      box.scrollTop = box.scrollHeight;

      try {
        const res = await API.chatbot.query(text, 'en');
                document.getElementById(botId).innerHTML = res.response;
            } catch (err) {
                document.getElementById(botId).innerHTML = "Operational error in Intelligence OS.";
            }
            box.scrollTop = box.scrollHeight;
        }

        initMap();
  </script>

  <!-- AI Copilot Widget -->
  <div class="copilot-widget glass-panel hologram-panel" id="copilot">
    <div class="copilot-header">
      <div style="display: flex; align-items: center; gap: 0.5rem; font-weight: 800;">
        <i class="fas fa-robot text-accent"></i> OCEAN OS COPILOT
      </div>
      <button onclick="toggleCopilot()" style="background: none; border: none; color: white; cursor: pointer;"><i
          class="fas fa-times"></i></button>
    </div>
    <div class="chat-container" id="chat-box">
      <div class="chat-bubble bubble-bot">
        Map View Intelligence Online. How can I help you analyze these marine sectors?
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" class="chat-input" placeholder="Analyze current region..."
        onkeypress="if(event.key === 'Enter') sendMessage()">
      <button onclick="sendMessage()" class="btn btn-primary" style="padding: 0.5rem 1rem;"><i
          class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <button onclick="toggleCopilot()" class="btn btn-primary"
    style="position: fixed; bottom: 2rem; right: 2rem; border-radius: 50%; width: 60px; height: 60px; padding: 0; justify-content: center; z-index: 1000; box-shadow: 0 0 20px var(--accent-neon);">
    <i class="fas fa-comment-dots" style="font-size: 1.5rem;"></i>
  </button>

  <div class="glowing-grid"></div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Tower | AquaSentinel AI</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .menu-item {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
        }
        .menu-item:hover, .menu-item.active {
            background: rgba(0, 243, 255, 0.1);
            color: var(--accent-color);
        }
        .stat-card {
            padding: 1.5rem;
            text-align: center;
        }
        .stat-card h2 {
            font-size: 2.5rem;
            margin-top: 0.5rem;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 1.2rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        .admin-table th {
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="nav-container">
        <nav class="navbar">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-microchip text-gradient" style="font-size: 1.5rem;"></i>
                <span style="font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;">AQUA<span class="text-gradient">SENTINEL</span></span>
            </a>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="status-tag success">Admin System Secure</div>
                <button onclick="AUTH.logout()" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.8rem; border-color: var(--danger); color: var(--danger);">Terminate</button>
            </div>
        </nav>
    </div>

    <main class="container" style="padding-top: 8rem; padding-bottom: 6rem;">
        <div class="admin-grid">
            <aside>
                <div class="glass-card sidebar-menu">
                    <a href="#" class="menu-item active"><i class="fas fa-chart-line"></i> Operations</a>
                    <a href="#" class="menu-item"><i class="fas fa-file-invoice"></i> Reports Queue</a>
                    <a href="#" class="menu-item"><i class="fas fa-users"></i> Authorities</a>
                    <a href="#" class="menu-item"><i class="fas fa-satellite"></i> NASA Monitor</a>
                    <a href="#" class="menu-item"><i class="fas fa-shield-halved"></i> Risk Settings</a>
                    <a href="#" class="menu-item"><i class="fas fa-clock-rotate-left"></i> Audit Logs</a>
                </div>
            </aside>

            <section style="display: flex; flex-direction: column; gap: 2rem;">
                <!-- Header Stats -->
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem;">
                    <div class="glass-card stat-card">
                        <label style="font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase;">Total Reports</label>
                        <h2 id="total-reports">--</h2>
                    </div>
                    <div class="glass-card stat-card">
                        <label style="font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase;">Active Alerts</label>
                        <h2 id="active-alerts" class="text-gradient">--</h2>
                    </div>
                    <div class="glass-card stat-card">
                        <label style="font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase;">Critical Risks</label>
                        <h2 id="critical-risks" style="color: var(--danger);">--</h2>
                    </div>
                    <div class="glass-card stat-card">
                        <label style="font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase;">System Health</label>
                        <h2 style="color: var(--success);">99%</h2>
                    </div>
                </div>

                <!-- Recent Activity Table -->
                <div class="glass-card">
                    <h3 style="margin-bottom: 2rem;">Live <span class="text-gradient">Intelligence Feed</span></h3>
                    <div style="overflow-x: auto;">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Incident ID</th>
                                    <th>Type</th>
                                    <th>Location</th>
                                    <th>Severity</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="admin-activity-feed">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/theme.js"></script>
    <script>
        AUTH.requireAuth();
        if (localStorage.getItem('role') !== 'admin') window.location.href = 'dashboard.html';

        async function loadAdminData() {
            try {
                const summary = await API.dashboard.summary();
                document.getElementById('total-reports').textContent = summary.total_reports;
                document.getElementById('active-alerts').textContent = summary.active_alerts;
                document.getElementById('critical-risks').textContent = summary.critical_risks;

                const feed = document.getElementById('admin-activity-feed');
                feed.innerHTML = summary.recent_reports.map(r => `
                    <tr>
                        <td>#${r.id.toString().padStart(4, '0')}</td>
                        <td><strong>${r.report_type.replace('_', ' ').toUpperCase()}</strong></td>
                        <td>${r.latitude.toFixed(2)}, ${r.longitude.toFixed(2)}</td>
                        <td><span class="status-tag ${r.severity === 'Critical' ? 'critical' : ''}">${r.severity}</span></td>
                        <td><span class="status-tag">${r.status.toUpperCase()}</span></td>
                        <td><button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.7rem;">Verify</button></td>
                    </tr>
                `).join('');
            } catch (err) { console.error(err); }
        }
        loadAdminData();
    </script>
</body>
</html>
